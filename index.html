<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mariage des Nounous</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a1118">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --bg: #faf8f5;
  --bg2: #f2ede8;
  --surface: #ffffff;
  --surface2: #f7f4f0;
  --surface3: #ede9e3;
  --border: rgba(0,0,0,0.07);
  --border-h: rgba(0,0,0,0.14);
  --accent: #c4547a;
  --accent2: #e8a0b8;
  --accent-dim: rgba(196,84,122,0.1);
  --accent-glow: rgba(196,84,122,0.25);
  --text: #1a1118;
  --text2: #4a3f46;
  --muted: #9a8f96;
  --muted2: #c2b8be;
  --green: #2d9b6f;
  --green-dim: rgba(45,155,111,0.1);
  --red: #d94f3d;
  --red-dim: rgba(217,79,61,0.1);
  --blue: #3b82c4;
  --blue-dim: rgba(59,130,196,0.1);
  --purple: #8b5cf6;
  --purple-dim: rgba(139,92,246,0.1);
  --gold: #c4963a;
  --gold-dim: rgba(196,150,58,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-lg: 24px;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
  --shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.06);
  --t: .2s cubic-bezier(.4,0,.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background: var(--bg); }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  padding: 16px 20px 14px;
  background: rgba(250,248,245,0.88);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 20;
}
.header-inner { display: flex; align-items: center; justify-content: space-between; }
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #e8698a);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.countdown-eglise { background: rgba(139,92,246,0.12); color: var(--purple); }
.header-title { font-size: 17px; font-weight: 700; letter-spacing: -.4px; color: var(--text); }
.header-title span { color: var(--accent); }
.countdown-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: .1px;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(250,248,245,0.94);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 30;
  padding: 8px 12px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
  gap: 4px;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 4px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 10px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  border-radius: 12px;
  transition: all var(--t);
  position: relative;
}
.nav-btn.active {
  color: var(--accent);
  background: var(--accent-dim);
  font-weight: 600;
}
.nav-icon { font-size: 20px; line-height: 1; transition: transform var(--t); }
.nav-btn.active .nav-icon { transform: scale(1.1); }

/* ── SECTIONS ── */
.section { display: none; padding: 16px 16px 24px; }
.section.active { display: block; }

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 18px;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px 10px;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.stat-num {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -.5px;
  color: var(--accent);
  line-height: 1;
}
.stat-lbl {
  font-size: 10px;
  color: var(--muted);
  margin-top: 3px;
  font-weight: 500;
}

/* ── FILTER ROW ── */
.filter-scroll {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  padding-bottom: 2px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.ftab {
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--t);
  box-shadow: var(--shadow-sm);
}
.ftab.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 12px var(--accent-glow); }
.fsel {
  padding: 7px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  border: 1px solid var(--border);
  margin-bottom: 5px;
  cursor: pointer;
  transition: all var(--t);
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card:active { transform: scale(.98); border-color: var(--accent); }
.card-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; flex: 1; min-width: 0; }
.card-name { font-size: 14px; font-weight: 600; letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-sub { font-size: 11px; color: var(--muted); font-weight: 500; }
.card-notes { font-size: 11px; color: var(--muted); }
.tags { display: flex; flex-wrap: nowrap; gap: 4px; align-items: center; flex-shrink: 0; }
.tag {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 5px;
  letter-spacing: .1px;
  white-space: nowrap;
  flex-shrink: 0;
}
/* Stat cards clickable */
.stat-card { cursor: pointer; transition: all var(--t); }
.stat-card:active { transform: scale(.96); }
.stat-card.active { border-color: var(--accent); box-shadow: 0 2px 12px var(--accent-glow); background: var(--accent-dim); }
/* Card colors per côté */
.card-nounette { background: #fff0f5 !important; border-color: #f9a8c9 !important; }
.card-nounou   { background: #eff6ff !important; border-color: #93c5fd !important; }
/* Stats grid 3 cols */
.stats-3 { grid-template-columns: repeat(3, 1fr); }
.tag-confirmé { background: var(--green-dim); color: var(--green); }
.tag-décliné { background: var(--red-dim); color: var(--red); }
.tag-invité { background: var(--accent-dim); color: var(--accent); }
.tag-oui { background: var(--green-dim); color: var(--green); }
.tag-non { background: var(--red-dim); color: var(--red); }
.tag-peut-être { background: rgba(245,158,11,0.12); color: #b45309; }
.tag-savethedate { background: var(--accent-dim); color: var(--accent); }
.tag-savedatedone { background: var(--green-dim); color: var(--green); }
.tag-nounette { background: #fce4ec; color: #c2185b; }
.tag-nounou { background: #e3f2fd; color: #1565c0; }
.tag-commun { background: var(--surface2); color: var(--muted); }
.tag-mariée { background: #fce4ec; color: #c2185b; }
.tag-marié { background: #e3f2fd; color: #1565c0; }
.tag-famille { background: var(--purple-dim); color: var(--purple); }
.tag-amis { background: var(--blue-dim); color: var(--blue); }
.tag-fait { background: var(--green-dim); color: var(--green); }
.tag-àfaire { background: var(--accent-dim); color: var(--accent); }
.tag-encours { background: var(--blue-dim); color: var(--blue); }
.tag-payé { background: var(--green-dim); color: var(--green); }
.tag-acompte { background: var(--blue-dim); color: var(--blue); }
.tag-devis { background: var(--gold-dim); color: var(--gold); }
.tag-prévu { background: var(--surface2); color: var(--muted); }
.tag-haute { background: var(--red-dim); color: var(--red); }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 56px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 52px; margin-bottom: 12px; opacity: .7; }
.empty p { font-size: 15px; font-weight: 500; }

/* ── BUDGET HERO ── */
.budget-hero {
  background: linear-gradient(135deg, var(--text) 0%, #3d2535 100%);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
  color: #fff;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}
.budget-hero::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(196,84,122,0.2);
  pointer-events: none;
}
.budget-hero-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.budget-hero-label { font-size: 12px; color: rgba(255,255,255,.55); font-weight: 500; margin-bottom: 4px; }
.budget-hero-val { font-size: 28px; font-weight: 800; letter-spacing: -.8px; }
.budget-hero-val-sm { font-size: 20px; font-weight: 700; text-align: right; }
.budget-bar-bg { height: 6px; background: rgba(255,255,255,.15); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.budget-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #e8698a); border-radius: 3px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.budget-bar-meta { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,.5); font-weight: 500; }
.card-amounts { display: flex; gap: 16px; margin-top: 10px; }
.amount-block { }
.amount-label { font-size: 10px; color: var(--muted); font-weight: 500; }
.amount-val { font-size: 14px; font-weight: 700; letter-spacing: -.2px; }

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(80px + env(safe-area-inset-bottom));
  right: 20px;
  width: 52px; height: 52px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--accent), #e8698a);
  color: #fff;
  font-size: 24px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 28px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.12);
  z-index: 20;
  transition: all var(--t);
}
.fab:active { transform: scale(.92); }

/* ── OVERLAY / MODAL ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,17,24,.65);
  z-index: 40;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.overlay.open { display: flex; }
.modal {
  width: 100%;
  max-height: 92vh;
  background: var(--surface);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 0 20px calc(20px + env(safe-area-inset-bottom));
  overflow-y: auto;
  animation: slideUp .3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--surface3);
  border-radius: 2px;
  margin: 12px auto 20px;
}
.modal h2 { font-size: 20px; font-weight: 800; letter-spacing: -.4px; margin-bottom: 20px; }
.field { margin-bottom: 14px; }
.field label {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  display: block;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .6px;
}
.field input,
.field select,
.field textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  outline: none;
  transition: all var(--t);
}
.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.field textarea { resize: none; height: 76px; line-height: 1.5; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.btn-row { display: flex; gap: 8px; margin-top: 10px; }
.btn-primary {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent), #e8698a);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  box-shadow: 0 4px 16px var(--accent-glow);
  transition: all var(--t);
}
.btn-primary:active { transform: scale(.97); }
.btn-secondary {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius-sm);
  background: var(--surface2);
  color: var(--text2);
  font-size: 15px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all var(--t);
}
.btn-danger {
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  background: var(--red-dim);
  color: var(--red);
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}

/* ── TOGGLE ── */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
}
.toggle-label { font-size: 15px; color: var(--text); font-weight: 500; }
.toggle {
  width: 46px; height: 28px;
  background: var(--surface3);
  border-radius: 14px;
  border: none;
  cursor: pointer;
  position: relative;
  transition: background var(--t);
  flex-shrink: 0;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 22px; height: 22px;
  background: #fff;
  border-radius: 50%;
  transition: transform var(--t);
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle.on::after { transform: translateX(18px); }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 6px 0 14px; }

/* ── TAGS STD & CATÉGORIE ── */
.tag-cat { background: var(--gold-dim); color: var(--gold); }
.tag-std-envoyé  { background: rgba(245,158,11,0.12); color: #b45309; border: 1.5px solid #f59e0b; }
.tag-std-confirmé { background: var(--green-dim); color: var(--green); border: 1.5px solid var(--green); }
.tag-brunch { background: var(--blue-dim); color: var(--blue); border: 1.5px solid var(--blue); }

/* ── LOGIN ── */
.login-screen {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px;
}
.login-title { font-size: 52px; font-weight: 800; letter-spacing: -2px; color: var(--text); margin-bottom: 6px; }
.login-sub { font-size: 16px; color: var(--muted); margin-bottom: 48px; font-weight: 500; }
.user-btns { display: flex; gap: 20px; }
.user-btn {
  flex: 1; min-width: 130px;
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius-lg); padding: 28px 20px;
  cursor: pointer; transition: all var(--t);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  box-shadow: var(--shadow);
  font-family: 'Inter', sans-serif;
}
.user-btn:active { transform: scale(.96); border-color: var(--accent); }
.user-btn .u-avatar { font-size: 40px; line-height: 1; }
.user-btn .u-name { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }

/* ── USER CHIP ── */
.user-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--accent-dim); color: var(--accent);
  font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 20px; cursor: pointer;
  border: none; font-family: 'Inter', sans-serif;
}

/* ── BRUNCH TOGGLE ── */
.btn-toggle-brunch {
  flex: 1;
  padding: 10px 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all var(--t);
}
.btn-toggle-brunch.active-oui { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.btn-toggle-brunch.active-non { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.btn-toggle-brunch.active-peutetre { background: rgba(245,158,11,0.12); border-color: #f59e0b; color: #b45309; }
.btn-toggle-brunch.active-std-env { background: rgba(245,158,11,0.12); border-color: #f59e0b; color: #b45309; }

/* ── ACTIVITY LOG ── */
.act-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 12px 16px; border: 1px solid var(--border);
  margin-bottom: 8px; box-shadow: var(--shadow-sm);
}
.act-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.act-user { font-size: 12px; font-weight: 700; }
.act-user.nounou { color: #1565c0; }
.act-user.nounette { color: #c2185b; }
.act-time { font-size: 11px; color: var(--muted); }
.act-action { font-size: 13px; color: var(--text2); font-weight: 500; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-icon">
        <svg width="28" height="24" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="lf"><rect x="0" y="0" width="53" height="100"/></clipPath>
            <clipPath id="lb"><rect x="53" y="0" width="47" height="100"/></clipPath>
          </defs>
          <ellipse cx="40" cy="53" rx="24" ry="12" stroke="rgba(255,255,255,0.22)" stroke-width="7" fill="none" transform="rotate(-8 40 53)" clip-path="url(#lb)"/>
          <ellipse cx="60" cy="47" rx="24" ry="12" stroke="white" stroke-width="6.5" fill="none" transform="rotate(8 60 47)"/>
          <polygon points="60,17 65,25 60,33 55,25" stroke="white" stroke-width="2.2" fill="none" stroke-linejoin="round"/>
          <line x1="55" y1="25" x2="65" y2="25" stroke="white" stroke-width="1.8"/>
          <ellipse cx="40" cy="53" rx="24" ry="12" stroke="white" stroke-width="7.5" fill="none" transform="rotate(-8 40 53)" clip-path="url(#lf)"/>
        </svg>
      </div>
      <div>
        <div class="header-title"><span>Mariage</span> des Nounous</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end">
      <div class="countdown-badge" id="countdown-mairie"></div>
      <div class="countdown-badge countdown-eglise" id="countdown-eglise"></div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────────
const SUPABASE_URL = 'https://jmqzkaiynffuibpuvoqz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3j98iINpvqmz0WybzhDxwg_vg-pYw-g';
let sb = null;
try { if (window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {}

async function sbFetch(table) {
  if (!sb) return null;
  try {
    const { data, error } = await sb.from(table).select('*');
    if (error) throw error;
    return data;
  } catch(e) { console.warn('[sb] fetch', table, e); return null; }
}
async function sbUpsert(table, row) {
  if (!sb) return;
  try { await sb.from(table).upsert(row); } catch(e) { console.warn('[sb] upsert', e); }
}
async function sbDelete(table, id) {
  if (!sb) return;
  try { await sb.from(table).delete().eq('id', id); } catch(e) { console.warn('[sb] del', e); }
}

// ── STORAGE ───────────────────────────────────────────────────────
const SK = 'mariage_v1';
function loadState() {
  try { return JSON.parse(localStorage.getItem(SK) || 'null'); } catch(e) { return null; }
}
function saveState() {
  localStorage.setItem(SK, JSON.stringify({ guests, tasks, budget, actLog }));
}
let stored = loadState() || {};
let guests = (stored.guests || []).filter(x => x && x.id && x.prenom);
let tasks  = (stored.tasks  || []).filter(x => x && x.id && x.titre);
let budget = (stored.budget || []).filter(x => x && x.id && x.description);
let actLog = stored.actLog || [];

// ── COUNTDOWN ────────────────────────────────────────────────────
function updateCountdown() {
  const today = new Date(); today.setHours(0,0,0,0);
  const mairie = new Date('2026-09-12');
  const eglise = new Date('2027-05-01');
  const diffM = Math.ceil((mairie - today) / 86400000);
  const diffE = Math.ceil((eglise - today) / 86400000);
  const em = document.getElementById('countdown-mairie');
  const ee = document.getElementById('countdown-eglise');
  if (em) em.innerHTML = diffM > 0 ? `💍 J-${diffM}` : diffM === 0 ? `💍 Aujourd'hui 🎉` : `💍 Mariés ❤️`;
  if (ee) ee.innerHTML = diffE > 0 ? `⛪ J-${diffE}` : diffE === 0 ? `⛪ Aujourd'hui 🎉` : `⛪ Mariés ❤️`;
}
updateCountdown();

// ── NAVIGATION ───────────────────────────────────────────────────
let currentSection = 'guests';
function goTo(name) {
  currentSection = name;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'guests') renderGuests();
  else if (name === 'tasks') renderTasks();
  else if (name === 'budget') renderBudget();
  else renderActivity();
}
function openAdd() {
  if (currentSection === 'guests') openGuestModal();
  else if (currentSection === 'tasks') openTaskModal();
  else openBudgetModal();
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── XSS PROTECTION ───────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── USER / LOGIN ──────────────────────────────────────────────────────────
let currentUser = sessionStorage.getItem('bigday_user') || null;
function selectUser(name) {
  currentUser = name;
  sessionStorage.setItem('bigday_user', name);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('nav-activity').style.display = name === 'Nounou' ? '' : 'none';
  logActivity('Connexion', name);
}
function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
}
function initUser() {
  if (currentUser) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('nav-activity').style.display = currentUser === 'Nounou' ? '' : 'none';
  }
}

// ── ACTIVITY LOG ──────────────────────────────────────────────────────────
function logActivity(action, details) {
  const entry = {
    id: uid(),
    user: currentUser || '?',
    action,
    details,
    ts: new Date().toISOString(),
  };
  actLog.unshift(entry);
  if (actLog.length > 200) actLog = actLog.slice(0, 200);
  saveState();
  if (document.getElementById('section-activity').classList.contains('active')) renderActivity();
}
function renderActivity() {
  const el = document.getElementById('activity-list');
  if (!actLog.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Aucune activité enregistrée.</p></div>';
    return;
  }
  el.innerHTML = actLog.map(e => {
    const d = new Date(e.ts);
    const dateStr = d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const cls = e.user === 'Nounou' ? 'nounou' : 'nounette';
    const avatar = e.user === 'Nounou' ? '🤵🏻' : '👰🏼';
    return `<div class="act-card">
      <div class="act-header">
        <span class="act-user ${cls}">${avatar} ${esc(e.user)}</span>
        <span class="act-time">${dateStr}</span>
      </div>
      <div class="act-action">${esc(e.action)} ${e.details ? '· ' + esc(e.details) : ''}</div>
    </div>`;
  }).join('');
}
function clearActivity() {
  if (!confirm('Effacer tout l\'historique ?')) return;
  actLog = [];
  saveState();
  renderActivity();
}

// ────────────────────────────────────────────────────────────────
// INVITÉS
// ────────────────────────────────────────────────────────────────
let gFilter = 'tous';
let stdFilter = '';
let brunchFilter = false;
function statGuestFilter(f, sf) {
  gFilter = f;
  stdFilter = sf;
  brunchFilter = (f === 'brunch');
  if (brunchFilter) gFilter = 'tous';
  renderGuests();
}
function renderGuests() {
  const cote = document.getElementById('g-cote-filter').value;
  const cat  = document.getElementById('g-cat-filter').value;
  let list = guests.filter(g => {
    if (brunchFilter && g.brunch !== 'oui') return false;
    if (!brunchFilter && gFilter !== 'tous' && g.statut !== gFilter) return false;
    if (stdFilter && g.std !== stdFilter) return false;
    if (cote && g.cote !== cote) return false;
    if (cat  && g.categorie !== cat) return false;
    return true;
  });
  const total = guests.length;
  const oui   = guests.filter(g => g.statut === 'oui').length;
  const non   = guests.filter(g => g.statut === 'non').length;
  const stdConf = guests.filter(g => g.std === 'confirmé').length;
  const peutEtre   = guests.filter(g => g.statut === 'peut-être').length;
  const stdEnvoye  = guests.filter(g => g.std === 'envoyé').length;
  const stdConfirm = guests.filter(g => g.std === 'confirmé').length;
  const totalNet   = oui + peutEtre;
  const brunchOui = guests.filter(g => g.brunch === 'oui').length;
  document.getElementById('guests-stats').className = 'stats-row';
  document.getElementById('guests-stats').innerHTML = `
    <div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
      <div class="stat-card${gFilter==='tous'&&stdFilter===''?' active':''}" onclick="statGuestFilter('tous','')"><div class="stat-num">${totalNet}</div><div class="stat-lbl">Total</div></div>
      <div class="stat-card${gFilter==='oui'?' active':''}" onclick="statGuestFilter('oui','')"><div class="stat-num" style="color:var(--green)">${oui}</div><div class="stat-lbl">Oui ✅</div></div>
      <div class="stat-card${gFilter==='peut-être'?' active':''}" onclick="statGuestFilter('peut-être','')"><div class="stat-num" style="color:#b45309">${peutEtre}</div><div class="stat-lbl">Peut-être ❓</div></div>
      <div class="stat-card${gFilter==='non'?' active':''}" onclick="statGuestFilter('non','')"><div class="stat-num" style="color:var(--red)">${non}</div><div class="stat-lbl">Non ❌</div></div>
    </div>
    <div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <div class="stat-card${stdFilter==='envoyé'?' active':''}" onclick="statGuestFilter('tous','envoyé')"><div class="stat-num" style="color:#b45309">${stdEnvoye}</div><div class="stat-lbl">STD envoyé 📩</div></div>
      <div class="stat-card${stdFilter==='confirmé'?' active':''}" onclick="statGuestFilter('tous','confirmé')"><div class="stat-num" style="color:var(--green)">${stdConfirm}</div><div class="stat-lbl">STD confirmé ✓</div></div>
      <div class="stat-card${gFilter==='brunch'?' active':''}" onclick="statGuestFilter('brunch','')"><div class="stat-num" style="color:var(--blue)">${brunchOui}</div><div class="stat-lbl">Brunch 🥐</div></div>
    </div>
  `;
  const el = document.getElementById('guests-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👥</div><p>Aucun invité. Appuie sur +&nbsp;!</p></div>`;
    return;
  }
  el.innerHTML = list.map(g => {
    const statutIcon = g.statut === 'oui' ? '✅' : g.statut === 'non' ? '❌' : '❓';
    const statutClass = g.statut === 'oui' ? 'oui' : g.statut === 'non' ? 'non' : 'peut-être';
    const coteIcon = g.cote === 'nounou' ? '🤵🏻' : g.cote === 'nounette' ? '👰🏼' : '🤝';
    const coteCardClass = g.cote === 'nounette' ? 'card-nounette' : g.cote === 'nounou' ? 'card-nounou' : '';
    const stdBadge = g.std === 'confirmé'
      ? `<span class="tag tag-std-confirmé">📩✓</span>`
      : g.std === 'envoyé'
      ? `<span class="tag tag-std-envoyé">📩</span>`
      : '';
    const brunchBadge = g.brunch === 'oui' ? `<span class="tag tag-brunch">🥐 Brunch</span>` : '';
    return `<div class="card ${coteCardClass}" onclick="editGuest('${g.id}')">
      <span style="font-size:16px;flex-shrink:0">${coteIcon}</span>
      <div class="card-row">
        <div class="card-name" style="flex:1">${esc(g.prenom)}${g.nom ? ' ' + esc(g.nom) : ''}</div>
        <div class="tags">
          ${g.categorie ? `<span class="tag tag-cat">${esc(g.categorie)}</span>` : ''}
          ${stdBadge}
          ${brunchBadge}
          ${g.notes ? `<span style="font-size:12px">📝</span>` : ''}
          <span class="tag tag-${statutClass}">${statutIcon}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

let editingGuestId = null;
function openGuestModal(id = null) {
  editingGuestId = id;
  const g = id ? guests.find(x => x.id === id) : null;

let tFilter = 'tous';
function taskFilter(f, el) {
  tFilter = f;
  document.querySelectorAll('#section-tasks .ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}
function renderTasks() {
  const cat = document.getElementById('t-cat-filter').value;
  const allCats = [...new Set(tasks.map(t => t.categorie).filter(Boolean))].sort();
  const tsel = document.getElementById('t-cat-filter');
  const tval = tsel.value;
  tsel.innerHTML = '<option value="">Catégorie…</option>' + allCats.map(c => `<option${c===tval?' selected':''}>${c}</option>`).join('');
  let list = tasks.filter(t => {
    if (tFilter !== 'tous' && t.statut !== tFilter) return false;
    if (cat && t.categorie !== cat) return false;
    return true;
  }).sort((a, b) => (a.priorite||2) - (b.priorite||2));
  const total   = tasks.length;
  const fait    = tasks.filter(t => t.statut === 'fait').length;
  const encours = tasks.filter(t => t.statut === 'en cours').length;
  const haute   = tasks.filter(t => t.priorite == 1 && t.statut !== 'fait').length;
  document.getElementById('tasks-stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${fait}/${total}</div><div class="stat-lbl">Faites</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${encours}</div><div class="stat-lbl">En cours</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${haute}</div><div class="stat-lbl">Urgentes</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--muted)">${total - fait}</div><div class="stat-lbl">Restantes</div></div>
  `;
  const el = document.getElementById('tasks-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><p>Aucune tâche. Appuie sur +&nbsp;!</p></div>`;
    return;
  }
  el.innerHTML = list.map(t => {
    const dl = t.deadline ? new Date(t.deadline).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : '';
    const tagStatut = t.statut === 'fait' ? 'fait' : t.statut === 'en cours' ? 'encours' : 'àfaire';
    return `<div class="card" onclick="editTask('${t.id}')" style="${t.statut==='fait'?'opacity:.55':''}">
      <div class="card-row">
        <div style="flex:1">
          <div class="card-name" style="${t.statut==='fait'?'text-decoration:line-through':''}">${esc(t.titre)}</div>
          <div class="card-sub">${t.categorie || ''}${dl ? ' · 📅 ' + dl : ''}</div>
        </div>
        <span class="tag tag-${tagStatut}">${t.statut}</span>
      </div>
      ${t.priorite == 1 ? '<div class="tags"><span class="tag tag-haute">🔴 Urgent</span></div>' : ''}
      ${t.notes ? `<div class="card-notes">${t.notes}</div>` : ''}
    </div>`;
  }).join('');
}

function renderBudget() {
  const cat = document.getElementById('b-cat-filter').value;
  const allCats = [...new Set(budget.map(b => b.categorie).filter(Boolean))].sort();
  const bsel = document.getElementById('b-cat-filter');
  const bval = bsel.value;
  bsel.innerHTML = '<option value="">Catégorie…</option>' + allCats.map(c => `<option${c===bval?' selected':''}>${c}</option>`).join('');
  let list = budget.filter(b => {
    if (bFilter !== 'tous' && b.statut !== bFilter) return false;
    if (cat && b.categorie !== cat) return false;
    return true;
  });
  const totalPrevu = budget.reduce((s,b) => s + (parseFloat(b.montant_prevu)||0), 0);
  const totalReel  = budget.reduce((s,b) => s + (parseFloat(b.montant_reel)||0), 0);
  const pct = totalPrevu > 0 ? Math.min(100, (totalReel / totalPrevu) * 100) : 0;
  const fmt = n => n.toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:0}) + ' €';
  document.getElementById('budget-totals').innerHTML = `
    <div class="budget-hero-row">
      <div>
        <div class="budget-hero-label">Budget prévu</div>
        <div class="budget-hero-val">${fmt(totalPrevu)}</div>
      </div>
      <div>
        <div class="budget-hero-label" style="text-align:right">Dépensé réel</div>
        <div class="budget-hero-val-sm">${fmt(totalReel)}</div>
      </div>
    </div>
    <div class="budget-bar-bg"><div class="budget-bar-fill" style="width:${pct}%"></div></div>
    <div class="budget-bar-meta"><span>${Math.round(pct)}% consommé</span><span>${fmt(totalPrevu - totalReel)} restant</span></div>
  `;
  const el = document.getElementById('budget-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">💰</div><p>Aucune dépense. Appuie sur +&nbsp;!</p></div>`;
    return;
  }
  el.innerHTML = list.map(b => {
    const tagStatut = b.statut.replace(' ','');
    return `<div class="card" onclick="editBudget('${b.id}')">
      <div class="card-row">
        <div style="flex:1">
          <div class="card-name">${esc(b.description)}</div>
          <div class="card-sub">${b.categorie || ''}</div>
        </div>
        <span class="tag tag-${tagStatut}">${b.statut}</span>
      </div>
      <div class="card-amounts">
        <div class="amount-block"><div class="amount-label">Prévu</div><div class="amount-val">${fmt(parseFloat(b.montant_prevu)||0)}</div></div>
        <div class="amount-block"><div class="amount-label">Réel</div><div class="amount-val" style="color:${(parseFloat(b.montant_reel)||0)>(parseFloat(b.montant_prevu)||0)?'var(--red)':'var(--green)'}">${fmt(parseFloat(b.montant_reel)||0)}</div></div>
      </div>
      ${b.notes ? `<div class="card-notes">${b.notes}</div>` : ''}
    </div>`;
  }).join('');
}

// ── CLOUD SYNC (source of vérité = Supabase) ─────────────────────────────
(async () => {
  if (!sb) return;
  try {
    const [cloudGuests, cloudTasks, cloudBudget] = await Promise.all([
      sbFetch('guests'), sbFetch('wedding_tasks'), sbFetch('budget_items')
    ]);
    let changed = false;
    if (cloudGuests?.length) {
      const valid = cloudGuests.filter(g => g && g.id && g.prenom);
      if (valid.length) { guests = valid; changed = true; }
    } else if (cloudGuests !== null && guests.length) {
      // Supabase vide → on pousse le local
      await Promise.all(guests.map(g => sbUpsert('guests', g)));
    }
    if (cloudTasks?.length) {
      const valid = cloudTasks.filter(t => t && t.id && t.titre);
      if (valid.length) { tasks = valid; changed = true; }
    } else if (cloudTasks !== null && tasks.length) {
      await Promise.all(tasks.map(t => sbUpsert('wedding_tasks', t)));
    }
    if (cloudBudget?.length) {
      const valid = cloudBudget.filter(b => b && b.id && b.description);
      if (valid.length) { budget = valid; changed = true; }
    } else if (cloudBudget !== null && budget.length) {
      await Promise.all(budget.map(b => sbUpsert('budget_items', b)));
    }
    if (changed) { saveState(); renderGuests(); if (currentSection==='tasks') renderTasks(); if (currentSection==='budget') renderBudget(); }
  } catch(e) { console.warn('[sync]', e); }
})();
