<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="22" fill="#1a1118"/>
  <!-- Alliance classique (Nounou) - anneau plein -->
  <ellipse cx="38" cy="58" rx="22" ry="14" stroke="white" stroke-width="5.5" fill="none"/>
  <!-- Alliance avec diamant (Nounette) -->
  <ellipse cx="62" cy="58" rx="22" ry="14" stroke="white" stroke-width="5.5" fill="none"/>
  <!-- Solitaire / diamant en haut -->
  <polygon points="62,18 70,28 62,38 54,28" stroke="white" stroke-width="3" fill="none" stroke-linejoin="round"/>
  <line x1="54" y1="28" x2="70" y2="28" stroke="white" stroke-width="2.5"/>
  <line x1="62" y1="18" x2="62" y2="38" stroke="white" stroke-width="1.5" stroke-dasharray="2 2"/>
</svg>
